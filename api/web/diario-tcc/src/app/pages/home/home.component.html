<section aria-labelledby="home-title">
  <h1 id="home-title" class="section-title">📔 Externalização</h1>
  <mat-card>
    <form [formGroup]="form" (ngSubmit)="save()">
      <mat-form-field appearance="fill">
        <mat-label>Situação vivida</mat-label>
        <textarea matInput formControlName="situacao" placeholder="Descreva a situação..."></textarea>
      </mat-form-field>

      <mat-form-field appearance="fill">
        <mat-label>Como você se sentiu?</mat-label>
        <textarea matInput formControlName="sentimentos" placeholder="Emoções, sensações físicas..."></textarea>
      </mat-form-field>

      <mat-form-field appearance="fill">
        <mat-label>Quais foram os pensamentos?</mat-label>
        <textarea matInput formControlName="pensamentos" placeholder="Pensamentos automáticos..."></textarea>
      </mat-form-field>

      <mat-form-field appearance="fill">
        <mat-label>Em quais fatos esses pensamentos se baseiam?</mat-label>
        <textarea matInput formControlName="fatos" placeholder="Evidências observáveis..."></textarea>
      </mat-form-field>

      <mat-form-field appearance="fill">
        <mat-label>Você pode resolver a situação? Se sim, como?</mat-label>
        <textarea matInput formControlName="resolucao" placeholder="Plano prático..."></textarea>
      </mat-form-field>

      <mat-form-field appearance="fill">
        <mat-label>O que tem observado nos seus pensamentos? (padrões, gatilhos)</mat-label>
        <textarea matInput formControlName="observacoes" placeholder="Padrões, gatilhos, contextos..."></textarea>
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">Salvar entrada</button>
    </form>
    <div class="small" style="margin-top:10px;color:#1b6a60;" *ngIf="feedback()">Entrada salva com carinho. 💚</div>
  </mat-card>
</section>

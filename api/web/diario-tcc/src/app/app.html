<a class="skiplink" href="#main">Pular para o conteúdo</a>

<!-- App Bar -->
<header class="appbar" role="banner">
  <button class="iconbtn" id="btnMenu" aria-label="Abrir menu" aria-haspopup="true" aria-controls="drawer" aria-expanded="false">
    <svg width="24" height="24" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
  </button>
  <div class="appbar__title">Diário TCC</div>
  <button class="iconbtn ml-auto" id="btnTheme" aria-label="Alternar tema" aria-pressed="false" title="Alternar tema"></button>
</header>

<!-- Drawer -->
<aside id="drawer" class="drawer" role="dialog" aria-modal="true" aria-label="Menu lateral">
  <div class="drawer__header">
    <div class="brand">🌱 Seu espaço seguro</div>
    <button class="iconbtn" id="btnClose" aria-label="Fechar menu">
      <svg width="22" height="22" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
  </div>
  <nav class="drawer__nav">
    <button class="nav__item active" data-route="#/home">
      <span class="nav__icon">🏠</span><span>Home</span>
    </button>
    <button class="nav__item" data-route="#/historico">
      <span class="nav__icon">🗂️</span><span>Histórico</span>
    </button>
    <button class="nav__item" data-route="#/analises">
      <span class="nav__icon">📊</span><span>Análises gerais</span>
    </button>
  </nav>
  <footer class="drawer__footer small">Conte com calma. Você está em segurança.</footer>
</aside>
<div id="scrim" class="scrim" aria-hidden="true"></div>

<!-- Conteúdo -->
<main id="main" class="container" role="main" tabindex="-1"></main>

<!-- Toast -->
<div id="toast" class="toast" role="status" aria-live="polite"></div>

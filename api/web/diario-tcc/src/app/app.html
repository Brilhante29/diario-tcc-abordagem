<mat-sidenav-container class="app-container">
  <mat-sidenav #sidenav mode="side">
    <mat-nav-list>
      <a mat-list-item href="#">Home</a>
      <a mat-list-item href="#">Histórico</a>
      <a mat-list-item href="#">Análises</a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary">
      <button mat-icon-button (click)="sidenav.toggle()" aria-label="Menu">
        <span class="material-icons">menu</span>
      </button>
      <span>TransporteX</span>
      <span class="spacer"></span>
    </mat-toolbar>

    <section class="hero">
      <h1>Conecte-se ao futuro do transporte</h1>
      <p>Rastreamento, segurança e eficiência em cada viagem.</p>
      <button mat-raised-button color="accent">Começar</button>
    </section>
  </mat-sidenav-content>
</mat-sidenav-container>

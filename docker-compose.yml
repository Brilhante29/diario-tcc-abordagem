version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: tcc_db
    environment:
      POSTGRES_DB: tcc
      POSTGRES_USER: tcc
      POSTGRES_PASSWORD: tcc
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tcc -d tcc"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    container_name: tcc_api
    environment:
      DATABASE_URL: postgresql+psycopg2://tcc:tcc@db:5432/tcc
      TZ_DISPLAY: America/Fortaleza
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
